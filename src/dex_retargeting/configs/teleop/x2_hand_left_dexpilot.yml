retargeting:
  type: DexPilot
  urdf_path: ../../../../original/x^2.urdf

  # The x2 URDF only contains rh_* names. Left-hand mode reuses the same
  # kinematics, root pose, joint names, and joint limits as right-hand mode.
  # Runtime control maps four-finger flexion to negative qpos for left_mode.
  # rh_FFJ1/rh_MFJ1/rh_RFJ1/rh_LFJ1 are mimic joints in this URDF.
  target_joint_names: [ "rh_FFJ3", "rh_MFJ3", "rh_RFJ3", "rh_LFJ3",
                        "rh_FFJ2", "rh_MFJ2", "rh_RFJ2", "rh_LFJ2",
                        "rh_THJ4", "rh_THJ3", "rh_THJ2", "rh_THJ1" ]
  wrist_link_name: "rh_palm"
  # Physical finger order in this URDF: TH, FF(index), MF(middle), RF(ring), LF(pinky).
  finger_tip_link_names: [ "rh_thtip", "rh_fftip", "rh_mftip", "rh_rftip", "rh_lftip" ]
  scaling_factor: 3.0

  low_pass_alpha: 0.5
